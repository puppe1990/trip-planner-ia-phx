name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    env:
      MIX_ENV: test
      SECRET_KEY_BASE: ci_secret_key_base_for_compile_only_32chars_min
      TURSO_DATABASE_URL: priv/data/ci.db
      GEMINI_API_KEY: ci-placeholder
      NVIDIA_API_KEY: ci-placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19'
          otp-version: '28'

      - name: Install Node dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: Install Elixir dependencies
        run: mix deps.get

      - name: Check Elixir formatting
        run: mix format --check-formatted

      - name: Lint (Credo)
        run: mix credo suggest --min-priority higher

      - name: Run tests
        run: mix test

      - name: Compile production
        run: MIX_ENV=prod mix compile --warnings-as-errors
        env:
          SECRET_KEY_BASE: ci_secret_key_base_for_compile_only_32chars_min
          TURSO_DATABASE_URL: priv/data/ci.db
