name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run tests
        run: mix test

      - name: Compile production
        run: MIX_ENV=prod mix compile --warnings-as-errors
        env:
          SECRET_KEY_BASE: ci_secret_key_base_for_compile_only_32chars_min
          TURSO_DATABASE_URL: priv/data/ci.db